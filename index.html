<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>MIPS WEB</title>
  <link rel="stylesheet" type="text/css" href="./css/index.css">
</head>
<body>

<div id="header">
  <div class="logo">MIPSWEB</div>
  <div class="buttons">
    <div id="settings" class="button">
        <div class="icon" data-resource="resources/icons/settings.svg"></div>
        <div class="text">Settings</div>
    </div>
  </div>
</div>
<div id="content">
  <div class="buttons">
    <div class="left">
        <div id="newFile" class="button">
          <div class="icon" data-resource="resources/icons/new-file.svg"></div>
          <div class="text">New File</div>
        </div>
        <div id="importFile" class="button">
            <div class="icon" data-resource="resources/icons/import-file.svg"></div>
            <div class="text">Import File</div>
        </div>
    </div>
    <div class="right">
      <div id="assemble" class="button">
        <div class="icon" data-resource="resources/icons/assemble.svg"></div>
        <div class="text">Assemble</div>
      </div>
      <div id="step" class="button">
        <div class="icon" data-resource="resources/icons/step.svg"></div>
        <div class="text">Step</div>
      </div>
      <div id="run" class="button">
        <div class="icon" data-resource="resources/icons/run.svg"></div>
        <div class="text">Run</div>
      </div>
      <div id="stop" class="button">
        <div class="icon" data-resource="resources/icons/stop.svg"></div>
        <div class="text">Stop</div>
      </div>
    </div>
  </div>
  <div id="editor-container">
      <div class="files">
        <!--
        <div class="button">
          <div class="icon" data-resource="resources/icons/files.svg"></div>
          <div class="text">Files</div>
        </div>
        -->
        <div id="files-tabs"></div>
      </div>
      <div id="editors"></div>
  </div>
  <div id="memory"></div>
  <div id="registers"></div>
</div>


<script src="./lib/ace-editor/src-noconflict/ace.js" type="text/javascript" charset="utf-8"></script>
<script type="module" src="./js/app.js"></script>
<script type="module" src="./js/files.js"></script>
<script type="module" src="./js/header.js"></script>
<script type="module" src="./js/editor.js"></script>
<script type="module" src="./js/buttons.js"></script>
<script type="module" src="./js/memory.js"></script>
<script type="module" src="./js/registers.js"></script>
</body>
</html>
